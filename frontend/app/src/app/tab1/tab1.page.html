<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Araçlar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="araclariGetir()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item *ngFor="let arac of araclar">
      <ion-label>
        <h2>{{ arac.marka }} {{ arac.model }}</h2>
        <p>{{ arac.musait ? 'Müsait' : 'Müsait Değil' }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="arac.musait ? 'success' : 'danger'">
        {{ arac.musait ? '✓' : '✗' }}
      </ion-badge>
    </ion-item>
  </ion-list>
</ion-content>
