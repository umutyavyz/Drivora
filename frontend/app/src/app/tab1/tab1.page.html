<ion-content [fullscreen]="true">
  
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Araç ara..." [(ngModel)]="aramaMetni"/>
  </div>

  <div class="categories">
    <button 
      *ngFor="let kategori of kategoriler" 
      class="category-btn"
      [class.active]="seciliKategori === kategori"
      (click)="kategoriSec(kategori)">
      {{ kategori }}
    </button>
  </div>

  <div class="arac-list">
    <div class="arac-card" *ngFor="let arac of filtrelenmisAraclar()">
      <div class="card-header">
        <div class="brand-info">
          <p class="brand">{{ arac.marka }}</p>
          <h3 class="model">{{ arac.model }}</h3>
        </div>
        <div class="price-info">
          <span class="amount">₺{{ arac.gunluk_fiyat }}</span>
          <span class="period">gün</span>
        </div>
      </div>

      <div class="card-image">
        <img [src]="arac.resim_url || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600'" [alt]="arac.marka"/>
      </div>

      <div class="card-footer">
        <div class="status" [class.musait]="arac.musait" [class.dolu]="!arac.musait">
          <span class="dot"></span>
          {{ arac.musait ? 'Müsait' : 'Dolu' }}
        </div>
        <button class="detail-btn" [disabled]="!arac.musait">
          Detay →
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="filtrelenmisAraclar().length === 0">
      <p>Bu kategoride araç bulunamadı.</p>
    </div>
  </div>

</ion-content>
