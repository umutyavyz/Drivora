<ion-content [fullscreen]="true">
  <div class="page-container">

    <div class="header">
      <p class="greeting">Hesabın</p>
      <h1>Profil</h1>
    </div>

    <div class="profile-card">
      <div class="avatar-wrapper">
        <div class="avatar">
          <ion-icon name="person" class="avatar-icon"></ion-icon>
        </div>
        <div class="badge" *ngIf="rol === 'admin'">
          <ion-icon name="shield-checkmark"></ion-icon>
        </div>
      </div>
      <h2>{{ adSoyad || email }}</h2>
      <p class="user-email" *ngIf="adSoyad">{{ email }}</p>
      <p class="role-tag">{{ rol === 'admin' ? 'Yönetici' : 'Üye' }}</p>
    </div>

    <div class="info-list">
      <div class="info-item" *ngIf="adSoyad">
        <div class="info-icon">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <div class="info-content">
          <p class="info-label">Ad Soyad</p>
          <p class="info-value">{{ adSoyad }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="info-icon">
          <ion-icon name="mail-outline"></ion-icon>
        </div>
        <div class="info-content">
          <p class="info-label">E-posta</p>
          <p class="info-value">{{ email }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="info-icon">
          <ion-icon name="shield-outline"></ion-icon>
        </div>
        <div class="info-content">
          <p class="info-label">Hesap Tipi</p>
          <p class="info-value">{{ rol === 'admin' ? 'Yönetici' : 'Standart Üye' }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="info-icon">
          <ion-icon name="time-outline"></ion-icon>
        </div>
        <div class="info-content">
          <p class="info-label">Üyelik</p>
          <p class="info-value">Aktif</p>
        </div>
      </div>
    </div>

    <div class="sifre-karti">
      <p class="section-title">Şifreyi Değiştir</p>
      <div class="sifre-form">
        <div class="sifre-input-group">
          <label>MEVCUT ŞIFRE</label>
          <div class="sifre-input-wrap">
            <ion-icon name="lock-closed-outline" class="sifre-icon"></ion-icon>
            <input type="password" [(ngModel)]="mevcutSifre" placeholder="Mevcut şifreniz"/>
          </div>
        </div>
        <div class="sifre-input-group">
          <label>YENİ ŞIFRE</label>
          <div class="sifre-input-wrap">
            <ion-icon name="lock-closed-outline" class="sifre-icon"></ion-icon>
            <input type="password" [(ngModel)]="yeniSifre" placeholder="En az 6 karakter"/>
          </div>
        </div>
        <div class="sifre-input-group">
          <label>YENİ ŞIFRE TEKRAR</label>
          <div class="sifre-input-wrap">
            <ion-icon name="lock-closed-outline" class="sifre-icon"></ion-icon>
            <input type="password" [(ngModel)]="yeniSifreTekrar" placeholder="Yeni şifreyi tekrar girin"/>
          </div>
        </div>
        <button class="sifre-kaydet-btn" (click)="sifreDegistir()">Şifreyi Güncelle</button>
      </div>
    </div>

    <div class="theme-selector">
      <p class="section-title">Tema Tercihi</p>
      <ion-segment [(ngModel)]="seciliTema" (ionChange)="temaDegistir($event)" mode="ios">
        <ion-segment-button value="light">
          <ion-icon name="sunny-outline"></ion-icon>
          Açık
        </ion-segment-button>
        <ion-segment-button value="dark">
          <ion-icon name="moon-outline"></ion-icon>
          Koyu
        </ion-segment-button>
        <ion-segment-button value="system">
          <ion-icon name="desktop-outline"></ion-icon>
          Sistem
        </ion-segment-button>
      </ion-segment>
    </div>

    <button class="logout-btn" (click)="cikisYap()">
      <ion-icon name="log-out-outline"></ion-icon>
      Çıkış Yap
    </button>

  </div>
</ion-content>
