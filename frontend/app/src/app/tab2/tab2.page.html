<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Kiralamalarım</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="kiralamalar.length > 0">
    <ion-item *ngFor="let kiralama of kiralamalar">
      <ion-label>
        <h2>{{ kiralama.marka }} {{ kiralama.model }}</h2>
        <p>Başlangıç: {{ kiralama.baslangic_tarihi | date:'dd.MM.yyyy HH:mm' }}</p>
        <p>Durum: {{ kiralama.durum }}</p>
      </ion-label>
      <ion-badge slot="end" color="primary">{{ kiralama.durum }}</ion-badge>
    </ion-item>
  </ion-list>

  <div *ngIf="kiralamalar.length === 0" style="text-align:center; padding: 40px;">
    <p>Henüz kiralamanız bulunmamaktadır.</p>
  </div>
</ion-content>
