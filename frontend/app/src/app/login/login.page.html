<ion-content>
  <div class="login-wrapper">

    <div class="hero-section">
      <img src="assets/car.jpg" alt="Car" class="hero-image"/>
      <div class="hero-gradient"></div>
      <div class="hero-overlay">
        <h1>Mükemmelliği<br>Deneyimle.</h1>
        <p>Seçkin sürücüler için özenle seçilmiş yüksek performanslı araçlar.</p>
      </div>
    </div>

    <div class="form-section">
      <div class="brand">
        <span class="brand-name">Drivora</span>
        <h2>Hoş Geldiniz</h2>
      </div>

      <div class="input-group">
        <label>E-POSTA ADRESİ</label>
        <div class="input-wrapper">
          <input type="email" [(ngModel)]="email" placeholder="kullanici@drivora.com"/>
        </div>
      </div>

      <div class="input-group">
        <label>PAROLA <span class="forgot" (click)="sifremiUnuttum()">UNUTTUNUZ MU?</span></label>
        <div class="input-wrapper">
          <input type="password" [(ngModel)]="sifre" placeholder="••••••••"/>
        </div>
      </div>

      <button class="login-btn" (click)="girisYap()">
        <span>Giriş Yap</span>
        <span class="btn-arrow">→</span>
      </button>

      <p class="register-text">
        <span class="register-link" (click)="kayitOl()">Hesap Oluştur</span>
      </p>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">veya</span>
        <span class="divider-line"></span>
      </div>

      <div class="social-row">
        <button class="social-btn"><ion-icon name="logo-google"></ion-icon> Google ile giriş yap</button>
        <button class="social-btn"><ion-icon name="logo-apple"></ion-icon> Apple ile giriş yap</button>
      </div>
    </div>

  </div>
</ion-content>
